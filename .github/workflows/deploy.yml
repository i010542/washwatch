name: WashWatch Weekly Update 🌰

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch wash trading intelligence
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if [ -z "$RAPIDAPI_KEY" ]; then
            echo "⚠️  RAPIDAPI_KEY not set — skipping data fetch, using existing data/"
          else
            node scripts/api-call.js
          fi
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Generate AI intelligence brief
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if [ -z "$RAPIDAPI_KEY" ]; then
            echo "⚠️  RAPIDAPI_KEY not set — skipping AI brief generation"
          else
            node scripts/generate-brief.js
          fi
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit data updates
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "WashWatch Bot 🌰"
          git add data/
          if ! git diff --staged --quiet; then
            LABEL="scheduled"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then LABEL="manual"; fi
            git commit -m "🌰 $LABEL update - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No data changes to commit"
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
